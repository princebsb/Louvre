name: condominio_louvre
description: App do Condomínio Louvre
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_html: ^3.0.0-beta.2
  path_provider: ^2.1.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  open_filex: ^4.3.4
  package_info_plus: ^8.0.0
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^7.2.2
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/predios.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"
